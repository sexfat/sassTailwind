<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>練習 5｜深色模式價目表（解答）</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @custom-variant dark (&:where(.dark, .dark *));
    @theme {
      --color-brand: #6366f1;
      --color-brand-dark: #4f46e5;
    }
  </style>
</head>
<body class="min-h-screen bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors p-8">

  <div class="max-w-5xl mx-auto">
    <div class="flex items-center justify-between mb-10">
      <div>
        <h1 class="text-3xl font-bold">選擇你的方案</h1>
        <p class="text-gray-500 dark:text-gray-400 mt-1">隨時可升級或取消</p>
      </div>
      <button onclick="document.documentElement.classList.toggle('dark')"
              class="px-4 py-2 rounded-lg bg-brand text-white hover:bg-brand-dark transition">
        切換深/淺色
      </button>
    </div>

    <!-- 三欄價目表：手機 1 欄、桌機 3 欄 -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

      <!-- Free -->
      <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-8">
        <h3 class="text-lg font-semibold">Free</h3>
        <p class="mt-4"><span class="text-4xl font-bold">$0</span><span class="text-gray-500">/月</span></p>
        <ul class="mt-6 space-y-2 text-gray-600 dark:text-gray-300 text-sm">
          <li>✓ 1 位使用者</li>
          <li>✓ 基本功能</li>
          <li>✓ 社群支援</li>
        </ul>
        <button class="mt-8 w-full py-2.5 rounded-lg border border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-700 transition">
          開始使用
        </button>
      </div>

      <!-- Pro（突顯：品牌色外框 + 放大）-->
      <div class="bg-white dark:bg-gray-800 rounded-2xl border-2 border-brand p-8 shadow-xl md:-translate-y-2 relative">
        <span class="absolute -top-3 left-1/2 -translate-x-1/2 px-3 py-1 text-xs font-semibold rounded-full bg-brand text-white">最受歡迎</span>
        <h3 class="text-lg font-semibold text-brand">Pro</h3>
        <p class="mt-4"><span class="text-4xl font-bold">$299</span><span class="text-gray-500">/月</span></p>
        <ul class="mt-6 space-y-2 text-gray-600 dark:text-gray-300 text-sm">
          <li>✓ 5 位使用者</li>
          <li>✓ 進階功能</li>
          <li>✓ 優先支援</li>
        </ul>
        <button class="mt-8 w-full py-2.5 rounded-lg bg-brand text-white hover:bg-brand-dark transition">
          升級 Pro
        </button>
      </div>

      <!-- Team -->
      <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-8">
        <h3 class="text-lg font-semibold">Team</h3>
        <p class="mt-4"><span class="text-4xl font-bold">$999</span><span class="text-gray-500">/月</span></p>
        <ul class="mt-6 space-y-2 text-gray-600 dark:text-gray-300 text-sm">
          <li>✓ 無限使用者</li>
          <li>✓ 全部功能</li>
          <li>✓ 專屬客服</li>
        </ul>
        <button class="mt-8 w-full py-2.5 rounded-lg border border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-700 transition">
          聯絡我們
        </button>
      </div>

    </div>
  </div>

  <script>
    (() => {
      const source = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
      const details = document.createElement('details');
      details.open = true;
      details.style.cssText = 'max-width:900px;margin:32px auto 0;background:#111827;color:#e5e7eb;border-radius:12px;overflow:hidden;text-align:left;';
      details.innerHTML = '<summary style="cursor:pointer;padding:12px 16px;font-weight:700;background:#0f172a;">本頁完整 HTML 程式碼</summary><pre style="margin:0;padding:16px;overflow:auto;font:13px/1.6 ui-monospace,Menlo,Consolas,monospace;"><code></code></pre>';
      details.querySelector('code').textContent = source;
      document.querySelector('.max-w-5xl').append(details);
    })();
  </script>
</body>
</html>
