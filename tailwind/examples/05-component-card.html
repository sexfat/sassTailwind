<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>範例 05｜綜合實戰：產品卡片牆</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-200 min-h-screen p-8">

  <div class="max-w-5xl mx-auto">
    <h1 class="text-3xl font-bold text-slate-800 mb-2">精選商品</h1>
    <p class="text-slate-500 mb-8">綜合運用 RWD、group-hover、狀態、圓角陰影的實戰範例</p>

    <!-- RWD 卡片牆 -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

      <!-- 卡片元件（重複三張，實務會抽成元件）-->
      <article class="group bg-white rounded-2xl shadow-sm hover:shadow-xl overflow-hidden transition duration-300">
        <div class="h-40 bg-gradient-to-r from-indigo-400 to-purple-400 group-hover:scale-105 transition"></div>
        <div class="p-5">
          <span class="inline-block px-2 py-0.5 text-xs rounded-full bg-indigo-100 text-indigo-700 mb-2">新品</span>
          <h3 class="text-lg font-bold text-slate-800 group-hover:text-indigo-600">無線耳機</h3>
          <p class="text-sm text-slate-500 mt-1 mb-4">降噪 · 30 小時續航</p>
          <div class="flex items-center justify-between">
            <span class="text-xl font-bold text-slate-900">$2,490</span>
            <button class="px-4 py-2 bg-indigo-600 text-white text-sm rounded-lg hover:bg-indigo-700 active:scale-95 transition">加入購物車</button>
          </div>
        </div>
      </article>

      <article class="group bg-white rounded-2xl shadow-sm hover:shadow-xl overflow-hidden transition duration-300">
        <div class="h-40 bg-gradient-to-r from-emerald-400 to-teal-400 group-hover:scale-105 transition"></div>
        <div class="p-5">
          <span class="inline-block px-2 py-0.5 text-xs rounded-full bg-emerald-100 text-emerald-700 mb-2">熱銷</span>
          <h3 class="text-lg font-bold text-slate-800 group-hover:text-emerald-600">智慧手錶</h3>
          <p class="text-sm text-slate-500 mt-1 mb-4">健康監測 · 防水</p>
          <div class="flex items-center justify-between">
            <span class="text-xl font-bold text-slate-900">$3,990</span>
            <button class="px-4 py-2 bg-emerald-600 text-white text-sm rounded-lg hover:bg-emerald-700 active:scale-95 transition">加入購物車</button>
          </div>
        </div>
      </article>

      <article class="group bg-white rounded-2xl shadow-sm hover:shadow-xl overflow-hidden transition duration-300">
        <div class="h-40 bg-gradient-to-r from-orange-400 to-pink-400 group-hover:scale-105 transition"></div>
        <div class="p-5">
          <span class="inline-block px-2 py-0.5 text-xs rounded-full bg-orange-100 text-orange-700 mb-2">限量</span>
          <h3 class="text-lg font-bold text-slate-800 group-hover:text-orange-600">機械鍵盤</h3>
          <p class="text-sm text-slate-500 mt-1 mb-4">熱插拔 · RGB 背光</p>
          <div class="flex items-center justify-between">
            <span class="text-xl font-bold text-slate-900">$2,190</span>
            <button class="px-4 py-2 bg-orange-600 text-white text-sm rounded-lg hover:bg-orange-700 active:scale-95 transition">加入購物車</button>
          </div>
        </div>
      </article>

    </div>
  </div>

</body>
</html>
