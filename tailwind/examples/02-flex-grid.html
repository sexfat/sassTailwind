<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>範例 02｜Flexbox 與 Grid</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 p-8">

  <h1 class="text-3xl font-bold text-gray-800 mb-6">02 Flexbox 與 Grid</h1>

  <!-- Flex：導覽列（兩端對齊 + 垂直置中）-->
  <section class="mb-8">
    <h2 class="text-xl font-semibold mb-3">Flex 導覽列 justify-between</h2>
    <nav class="flex items-center justify-between bg-white p-4 rounded-lg shadow">
      <div class="font-bold text-lg text-blue-600">LOGO</div>
      <div class="flex gap-6 text-gray-600">
        <a href="#" class="hover:text-blue-600">首頁</a>
        <a href="#" class="hover:text-blue-600">關於</a>
        <a href="#" class="hover:text-blue-600">聯絡</a>
      </div>
    </nav>
  </section>

  <!-- Grid：三欄卡片 -->
  <section class="mb-8">
    <h2 class="text-xl font-semibold mb-3">Grid 三欄卡片 grid-cols-3</h2>
    <div class="grid grid-cols-3 gap-4">
      <div class="bg-white p-6 rounded-lg shadow text-center">卡片 1</div>
      <div class="bg-white p-6 rounded-lg shadow text-center">卡片 2</div>
      <div class="bg-white p-6 rounded-lg shadow text-center">卡片 3</div>
    </div>
  </section>

  <!-- 經典水平垂直置中 -->
  <section>
    <h2 class="text-xl font-semibold mb-3">水平垂直置中</h2>
    <div class="flex items-center justify-center h-48 bg-white rounded-lg shadow">
      <div class="px-6 py-3 bg-green-500 text-white rounded-lg">我在正中央</div>
    </div>
  </section>

</body>
</html>
