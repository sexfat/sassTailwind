<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>範例 01｜Tailwind 基礎工具類</title>
  <!-- Tailwind v4 Play CDN：直接用瀏覽器打開此檔即可看效果 -->
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 p-8 font-sans">

  <h1 class="text-3xl font-bold text-gray-800 mb-6">01 基礎工具類</h1>

  <!-- 間距、顏色、圓角、陰影 -->
  <section class="mb-8">
    <h2 class="text-xl font-semibold text-gray-700 mb-3">間距 / 顏色 / 圓角 / 陰影</h2>
    <div class="p-6 bg-white rounded-lg shadow-md">
      <p class="text-gray-600 leading-relaxed">
        這個卡片用了 <code class="bg-gray-100 px-1 rounded">p-6</code>、
        <code class="bg-gray-100 px-1 rounded">bg-white</code>、
        <code class="bg-gray-100 px-1 rounded">rounded-lg</code>、
        <code class="bg-gray-100 px-1 rounded">shadow-md</code>。
      </p>
    </div>
  </section>

  <!-- 文字工具類 -->
  <section class="mb-8">
    <h2 class="text-xl font-semibold text-gray-700 mb-3">文字</h2>
    <p class="text-sm text-gray-500">text-sm 小字</p>
    <p class="text-lg text-blue-600 font-medium">text-lg 藍色中等字重</p>
    <p class="text-2xl font-bold text-center text-purple-700">text-2xl 置中粗體</p>
  </section>

  <!-- 顏色深淺 -->
  <section>
    <h2 class="text-xl font-semibold text-gray-700 mb-3">顏色深淺（50 → 900）</h2>
    <div class="flex gap-2">
      <div class="w-16 h-16 bg-blue-100 rounded flex items-center justify-center text-xs">100</div>
      <div class="w-16 h-16 bg-blue-300 rounded flex items-center justify-center text-xs">300</div>
      <div class="w-16 h-16 bg-blue-500 rounded flex items-center justify-center text-xs text-white">500</div>
      <div class="w-16 h-16 bg-blue-700 rounded flex items-center justify-center text-xs text-white">700</div>
      <div class="w-16 h-16 bg-blue-900 rounded flex items-center justify-center text-xs text-white">900</div>
    </div>
  </section>

</body>
</html>
