<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>範例 03｜RWD 與狀態變體</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 p-8">

  <h1 class="text-3xl font-bold text-gray-800 mb-6">03 響應式 + 狀態</h1>

  <!-- RWD：手機1欄 / 平板2欄 / 桌機4欄。拉動視窗寬度觀察 -->
  <section class="mb-8">
    <h2 class="text-xl font-semibold mb-3">
      RWD：<span class="text-blue-600">grid-cols-1 md:grid-cols-2 lg:grid-cols-4</span>
      <span class="text-sm text-gray-500">（拉寬/縮窄視窗看變化）</span>
    </h2>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
      <div class="bg-blue-500 text-white p-6 rounded-lg text-center">1</div>
      <div class="bg-blue-500 text-white p-6 rounded-lg text-center">2</div>
      <div class="bg-blue-500 text-white p-6 rounded-lg text-center">3</div>
      <div class="bg-blue-500 text-white p-6 rounded-lg text-center">4</div>
    </div>
  </section>

  <!-- 狀態變體 hover / focus / active -->
  <section class="mb-8">
    <h2 class="text-xl font-semibold mb-3">hover / focus / active</h2>
    <button class="px-5 py-2.5 bg-blue-500 text-white rounded-lg font-medium
                   hover:bg-blue-700 focus:ring-4 focus:ring-blue-300
                   active:scale-95 transition">
      把滑鼠移過來、點下去、Tab 聚焦試試
    </button>
  </section>

  <!-- group：整卡 hover 連動 -->
  <section>
    <h2 class="text-xl font-semibold mb-3">group-hover</h2>
    <a href="#" class="group block max-w-sm p-5 bg-white rounded-lg shadow hover:shadow-xl transition">
      <h3 class="text-lg font-bold text-gray-800 group-hover:text-blue-600">卡片標題</h3>
      <p class="text-gray-500 group-hover:text-gray-700">滑到整張卡片，標題與內文都會變色。</p>
    </a>
  </section>

</body>
</html>
